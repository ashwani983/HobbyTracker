name: hobby_tracker
description: "A Flutter app to track, manage, and visualize hobbies."
publish_to: 'none'
version: 3.0.0+3

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.0.0

  # Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0

  # DI
  get_it: ^7.6.4
  injectable: ^2.3.2

  # UI
  fl_chart: ^0.66.0
  flutter_slidable: ^3.0.1
  intl: ^0.20.2

  # Utilities
  uuid: ^4.2.1
  path_provider: ^2.1.1
  path: ^1.9.1

  # Notifications
  flutter_local_notifications: ^20.0.0
  timezone: ^0.10.1
  flutter_timezone: ^3.0.1

  # Images
  image_picker: ^1.0.5

  # Export
  csv: ^6.0.0
  pdf: ^3.10.0
  share_plus: ^7.2.0

  # Preferences
  shared_preferences: ^2.2.2

  # Firebase & Auth
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  google_sign_in: ^6.2.2

  # Update checker
  http: ^1.2.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.0

  # Home Screen Widget
  home_widget: ^0.9.0
  audioplayers: ^6.6.0
  app_links: ^7.0.0
  table_calendar: ^3.2.0
  record: ^6.2.0
  just_audio: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.4
  build_runner: ^2.4.7
  drift_dev: ^2.14.0
  glados: ^1.1.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/sounds/
